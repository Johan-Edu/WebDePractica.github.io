<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña — BlogFlow</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">

  <div class="auth-background">
    <div class="auth-grain"></div>
  </div>

  <a href="index.html" class="auth-logo-link">
    <span class="logo">Blog<span>Flow</span></span>
  </a>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">
          <i class="ph ph-lock-key"></i>
        </div>
        <h1>Restablecer contraseña</h1>
        <p>Ingresa tu nueva contraseña.</p>
      </div>

      <form class="auth-form" id="reset-password-form">
        <div class="input-group">
          <label for="new-password">Nueva contraseña</label>
          <div class="input-wrapper">
            <i class="ph ph-lock-key"></i>
            <input type="password" id="new-password" placeholder="Mínimo 8 caracteres" required />
          </div>
        </div>

        <div class="input-group">
          <label for="confirm-password">Confirmar contraseña</label>
          <div class="input-wrapper">
            <i class="ph ph-lock-key"></i>
            <input type="password" id="confirm-password" placeholder="Repite la contraseña" required />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          Actualizar contraseña <i class="ph ph-check"></i>
        </button>
      </form>
    </div>
  </main>

  <script src="reset-password.js"></script>

</body>
</html>
