<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — BlogFlow</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">

  <div class="auth-background">
    <div class="auth-grain"></div>
  </div>

  <a href="index.html" class="auth-logo-link">
    <span class="logo">Blog<span>Flow</span></span>
  </a>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Crea tu cuenta</h1>
        <p>Únete a la comunidad y empieza a explorar</p>
      </div>

      <form class="auth-form" id="register-form" novalidate>
        <div class="input-group">
          <label for="name">Nombre completo</label>
          <div class="input-wrapper">
            <i class="ph ph-user"></i>
            <input type="text" id="name" placeholder="Alex Pérez" required />
          </div>
        </div>

        <div class="input-group">
          <label for="email">Correo electrónico</label>
          <div class="input-wrapper">
            <i class="ph ph-envelope-simple"></i>
            <input type="email" id="email" placeholder="tu@email.com" required />
          </div>
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <i class="ph ph-lock-key"></i>
            <input type="password" id="password" placeholder="Mínimo 8 caracteres" required />
            <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
              <i class="ph ph-eye"></i>
            </button>
          </div>
          <div class="password-strength">
            <div class="strength-bars">
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
            </div>
            <span class="strength-text">La contraseña es muy débil</span>
          </div>
        </div>

        <label class="checkbox-label terms-label">
          <input type="checkbox" required />
          <span class="checkmark"></span>
          Acepto los <a href="terminos.html">términos y condiciones</a> y la <a href="privacidad.html">política de privacidad</a>
        </label>

        <button type="submit" class="btn btn-primary btn-full">
          Crear cuenta <i class="ph ph-arrow-right"></i>
        </button>
      </form>

      <div class="auth-divider">
        <span>o registrarse con</span>
      </div>

      <div class="social-buttons">
        <button type="button" class="btn-social">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google
        </button>
        <button type="button" class="btn-social">
          <i class="ph ph-github-logo"></i>
          GitHub
        </button>
      </div>

      <p class="auth-footer">
        ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
      </p>
    </div>
  </main>

  <script src="auth.js"></script>

</body>
</html>
