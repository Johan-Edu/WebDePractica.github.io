<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña — BlogFlow</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">

  <div class="auth-background">
    <div class="auth-grain"></div>
  </div>

  <a href="index.html" class="auth-logo-link">
    <span class="logo">Blog<span>Flow</span></span>
  </a>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">
          <i class="ph ph-key"></i>
        </div>
        <h1>¿Olvidaste tu contraseña?</h1>
        <p>No te preocupes. Ingresa tu correo electrónico y te enviaremos un enlace para restablecerla.</p>
      </div>

      <form class="auth-form" id="forgot-password-form">
        <div class="input-group">
          <label for="email">Correo electrónico</label>
          <div class="input-wrapper">
            <i class="ph ph-envelope-simple"></i>
            <input type="email" id="email" placeholder="tu@email.com" required />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          Enviar enlace de recuperación <i class="ph ph-paper-plane-right"></i>
        </button>
      </form>

      <div class="auth-footer">
        <a href="login.html" class="auth-link">
          <i class="ph ph-arrow-left"></i> Volver al inicio de sesión
        </a>
      </div>
    </div>
  </main>

  <script src="forgot-password.js"></script>

</body>
</html>
